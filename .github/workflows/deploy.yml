name: CI / Deploy to Vercel

# Every push to main: test, then deploy to production.
# Every PR to main: test, then deploy a preview.
# The deploy steps only run once VERCEL_* secrets are configured (see docs).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One deploy at a time per ref; newer pushes cancel in-flight runs.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ---- Test gate: must pass before any deploy ----
      - name: Install dependencies
        run: npm ci

      - name: Build (multi-page)
        run: npm run build

      - name: Smoke test
        run: npm test

      # ---- Deploy (skipped until VERCEL_TOKEN secret exists) ----
      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install --global vercel@latest

      - name: Deploy preview (pull request)
        if: github.event_name == 'pull_request' && env.VERCEL_TOKEN != ''
        run: |
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          vercel build --token="$VERCEL_TOKEN"
          url=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "Preview deployed: $url"
          echo "### 🔍 Preview: $url" >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy production (push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.VERCEL_TOKEN != ''
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "Production deployed: $url"
          echo "### 🚀 Production: $url" >> "$GITHUB_STEP_SUMMARY"
